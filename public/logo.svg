<svg width="420" height="160" viewBox="0 0 420 160" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="calendarGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>

  <!-- Body -->
  <ellipse cx="85" cy="95" rx="45" ry="35" fill="white" />

  <!-- Wing -->
  <path d="M65 95 C55 80, 85 75, 95 95 C85 105, 70 110, 65 95 Z"
        fill="#E5E7EB" />

  <!-- Neck -->
  <path d="M95 75 C95 45, 140 45, 130 75 C120 95, 95 95, 95 75 Z"
        fill="white"/>

  <!-- Head -->
  <circle cx="120" cy="55" r="25" fill="white" />

  <!-- Eye -->
  <circle cx="128" cy="52" r="4" fill="#0F172A"/>

  <!-- Beak -->
  <path d="M135 60 C160 55, 160 75, 135 72 Z"
        fill="#94A3B8"/>

  <!-- Calendar -->
  <rect x="110" y="85" width="45" height="40" rx="10"
        fill="url(#calendarGradient)" />

  <!-- Calendar Rings -->
  <rect x="120" y="80" width="6" height="10" rx="3" fill="#0284C7"/>
  <rect x="140" y="80" width="6" height="10" rx="3" fill="#0284C7"/>

  <!-- Check -->
  <path d="M122 105 L132 115 L150 98"
        stroke="white"
        stroke-width="4"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Sparkles -->
  <circle cx="70" cy="45" r="3" fill="#E2E8F0"/>
  <circle cx="155" cy="40" r="4" fill="#CBD5E1"/>

  <!-- Text -->
  <text x="190" y="85"
        font-family="Inter, sans-serif"
        font-size="42"
        font-weight="700"
        fill="white">
    dodo
  </text>

  <text x="190" y="120"
        font-family="Inter, sans-serif"
        font-size="28"
        font-weight="500"
        fill="#E2E8F0">
    events
  </text>

</svg>